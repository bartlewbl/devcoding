name: Deploy Backend to Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/ai-code-studio
            bash scripts/deploy.sh
